name: test

on:
  push:
    branches:
      - main
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    env:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
      AVALANCHE_RPC_URL: ${{ secrets.AVALANCHE_RPC_URL }}
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      BERA_CHAIN_RPC_URL: ${{ secrets.BERA_CHAIN_RPC_URL }}
      BNB_RPC_URL: ${{ secrets.BNB_RPC_URL }}
      BOB_RPC_URL: ${{ secrets.BOB_RPC_URL }}
      CORN_RPC_URL: ${{ secrets.CORN_RPC_URL }}
      DERIVE_RPC_URL: ${{ secrets.DERIVE_RPC_URL }}
      FLARE_RPC_URL: ${{ secrets.FLARE_RPC_URL }}
      HYPER_EVM_RPC_URL: ${{ secrets.HYPER_EVM_RPC_URL }}
      KATANA_RPC_URL: ${{ secrets.KATANA_RPC_URL }}
      LINEA_RPC_URL: ${{ secrets.LINEA_RPC_URL }}
      MANTLE_RPC_URL: ${{ secrets.MANTLE_RPC_URL }}
      PLASMA_RPC_URL: ${{ secrets.PLASMA_RPC_URL }}
      PLUME_RPC_URL: ${{ secrets.PLUME_RPC_URL }}
      SCROLL_RPC_URL: ${{ secrets.SCROLL_RPC_URL }}
      SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
      SONIC_MAINNET_RPC_URL: ${{ secrets.SONIC_MAINNET_RPC_URL }}
      SWELL_CHAIN_RPC_URL: ${{ secrets.SWELL_CHAIN_RPC_URL }}
      TAC_RPC_URL: ${{ secrets.TAC_RPC_URL }}
      UNICHAIN_RPC_URL: ${{ secrets.UNICHAIN_RPC_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
          cache: true

      - name: Restore Forge compilation cache
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: forge-build-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'foundry.toml') }}
          restore-keys: |
            forge-build-

      - name: Restore RPC fork cache
        uses: actions/cache@v4
        with:
          path: ~/.foundry/cache/rpc
          key: forge-rpc-${{ hashFiles('test/**/*.sol') }}
          restore-keys: |
            forge-rpc-

      - name: Check formatting
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge --version
          forge build --skip script
        id: build

      - name: Run Forge tests
        run: |
          forge test -vv --skip script --skip Integration
        id: test
