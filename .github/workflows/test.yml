name: test

on:
  push:
    branches:
      - main
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    env:
      MAINNET_RPC_URL: https://mainnet.infura.io/v3/${{ secrets.INFURA_API_KEY }}
      ARBITRUM_RPC_URL: https://arbitrum-mainnet.infura.io/v3/${{ secrets.INFURA_API_KEY }}
      BASE_RPC_URL: https://base-mainnet.g.alchemy.com/v2/${{ secrets.ALCHEMY_API_KEY }}
      AVALANCHE_RPC_URL: https://avalanche-mainnet.infura.io/v3/${{ secrets.INFURA_API_KEY }}
      OPTIMISM_RPC_URL: https://optimism-mainnet.infura.io/v3/${{ secrets.INFURA_API_KEY }}
      LINEA_RPC_URL: https://linea-mainnet.infura.io/v3/${{ secrets.INFURA_API_KEY }}
      MANTLE_RPC_URL: https://mantle-mainnet.infura.io/v3/${{ secrets.INFURA_API_KEY }}
      HOLESKY_RPC_URL: https://holesky.infura.io/v3/${{ secrets.INFURA_API_KEY_0 }}
      SONIC_MAINNET_RPC_URL: ${{ secrets.SONIC_MAINNET_RPC_URL }}
      BERA_CHAIN_RPC_URL: ${{ secrets.BERA_CHAIN_RPC_URL }}
      BARTIO_RPC_URL: ${{ secrets.BARTIO_RPC_URL }}
      FLARE_RPC_URL: ${{ secrets.FLARE_RPC_URL }}
      SWELL_CHAIN_RPC_URL: ${{ secrets.SWELL_CHAIN_RPC_URL }}
      SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
          cache: true

      - name: Restore Forge compilation cache
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: forge-build-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'foundry.toml') }}
          restore-keys: |
            forge-build-

      - name: Restore RPC fork cache
        uses: actions/cache@v4
        with:
          path: ~/.foundry/cache/rpc
          key: forge-rpc-${{ hashFiles('test/**/*.sol') }}
          restore-keys: |
            forge-rpc-

      - name: Run Forge build
        run: |
          forge --version
          forge build --skip script
        id: build

      - name: Run Forge tests
        run: |
          forge test -vv --skip script --skip Integration --skip TellerWithReferral
        id: test
