name: test

on:
  push:
    branches:
      - main
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    env:
      MAINNET_RPC_URL: https://eth-mainnet.g.alchemy.com/v2/${{ secrets.ALCHEMY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
          cache: true

      - name: Restore Forge compilation cache
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: forge-build-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'foundry.toml') }}
          restore-keys: |
            forge-build-

      - name: Restore RPC fork cache
        uses: actions/cache@v4
        with:
          path: ~/.foundry/cache/rpc
          key: forge-rpc-${{ hashFiles('test/**/*.sol') }}
          restore-keys: |
            forge-rpc-

      - name: Check formatting
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge --version
          forge build --skip script
        id: build

      - name: Run Forge tests
        run: |
          forge test -vv --skip script --skip Integration
        id: test
